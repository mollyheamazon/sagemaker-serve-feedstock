schema_version: 1

context:
  version: "1.10.0"

package:
  name: sagemaker-serve
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/sagemaker-serve/sagemaker_serve-${{ version }}.tar.gz
  sha256: 91b36a3a5b9cc3fc41c3413e75ee523e58a6a362ca182e66368b9e2b4f150728

build:
  number: 0
  noarch: python
  script: |
    ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    rm -f $SP_DIR/sagemaker/__init__.py
    rm -rf $SP_DIR/sagemaker/__pycache__

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=64
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - sagemaker-core >=2.5.0
    - sagemaker-train >=1.5.0
    - sagemaker-schema-inference-artifacts
    - boto3 >=1.42.2,<2.0
    - botocore >=1.35.75,<2.0
    - protobuf >=4.25.8,<7.0
    - deepdiff
    - mlflow
    - tqdm
    - psutil
    - tritonclient
    - onnx
    - onnxruntime
    - pytorch >=2.0.0
    - pytest

tests:
  - python:
      imports:
        - sagemaker.serve
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: SageMaker Serve package for model serving and deployment
  homepage: https://github.com/aws/sagemaker-python-sdk
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://sagemaker.readthedocs.io/en/stable/
  repository: https://github.com/aws/sagemaker-python-sdk

extra:
  recipe-maintainers:
    - mollyheamazon
    - mufaddal-rohawala
    - nargokul
